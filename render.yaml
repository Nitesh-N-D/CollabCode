services:
  - type: web
    name: collabcode-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: pnpm --filter @collabcode/server start
    envVars:
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        sync: false
      - key: STUDENT_PORTAL_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
